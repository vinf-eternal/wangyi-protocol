name: 望易 V∞ AGI | OpenCode Autopilot

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  generate-issues:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run OpenCode
        uses: opencode-ai/opencode-action@v1 
        with:
          prompt: .opencode/prompt.md
          github-token: ${{ secrets.GITHUB_TOKEN }}
          kimi-api-key: ${{ secrets.KIMI_API_KEY }}
